name: tests

# Runs the fully-offline test suite on every push/PR to main. The suite needs
# NO Anthropic API key and NO network — tests/conftest.py force-sets a fake key
# and isolated temp dirs, and the Anthropic client + every external backend are
# mocked or degrade behind availability flags. This locks in the offline
# guarantee as a regression gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: offline test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt
      - name: Install offline test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Run tests (no API key, no network)
        run: python -m pytest -q
