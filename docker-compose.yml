version: "3.9"

services:
  agent-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redteam-agents
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # persist evidence, reports, knowledge base
      - ./.env:/app/.env:ro       # read-only env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - redteam-net

  # Optional (2A) — attack-graph browser. Set NEO4J_URI=bolt://neo4j:7687 in .env
  # to use it; browser at http://localhost:7474 (login neo4j / change_me_neo4j).
  neo4j:
    image: neo4j:5
    container_name: redteam-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/change_me_neo4j
    volumes:
      - neo4j-data:/data
    restart: unless-stopped
    networks:
      - redteam-net

  # Optional (5C) — traces. Set OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
  # in .env (or http://localhost:4318/v1/traces from the host). UI at http://localhost:16686.
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: redteam-jaeger
    ports:
      - "16686:16686"   # UI
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - redteam-net

networks:
  redteam-net:
    driver: bridge

volumes:
  neo4j-data:
